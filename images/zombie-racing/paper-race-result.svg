<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="44" y="34" width="1192" height="692" rx="28" fill="#141b2d" stroke="#2c3650" filter="url(#shadow)"/>
  <rect x="44" y="34" width="1192" height="104" rx="28" fill="#1e293b"/>
  <circle cx="96" cy="86" r="23" fill="#f59e0b"/><text x="83" y="96" font-family="Arial" font-size="28" font-weight="800" fill="#052e16">🏁</text>

<text x="134" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Admin race completion and stats verified</text>
<text x="134" y="116" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#b7c2d6">/startrace completed race #1 and advanced the module to race #2</text>
<rect x="76" y="150" width="1128" height="220" rx="18" fill="#0f172a" stroke="#2d3a55"/>
<text x="104" y="184" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Race result</text>
<text x="128" y="224" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• /startrace returned success=true and completed Paper Horse Derby #1.</text>
<text x="128" y="255" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• Winner: Thunder. Final order: Thunder, Pickle, Mango, Comet.</text>
<text x="128" y="286" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• The Comet bet lost, so total wagered was 50 and total payout was 0.</text>
<text x="128" y="317" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• /lastrace and /racestats both worked after completion.</text>
<rect x="76" y="372" width="1128" height="220" rx="18" fill="#0f172a" stroke="#2d3a55"/>
<text x="104" y="406" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Persisted variables</text>
<text x="128" y="446" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• zombie_racing_state_v1 now has raceNumber=2, no active bets, and lastRaceResults for race</text>
<text x="128" y="477" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">  #1.</text>
<text x="128" y="508" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• zombie_racing_stats_v1 recorded Bot1_RaceTester totalBets=1, totalWagered=50, wins=0,</text>
<text x="128" y="539" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">  losses=1, favoriteRacer=Comet.</text>
<rect x="76" y="642" width="1128" height="54" rx="16" fill="#13251d" stroke="#1f7a4b"/>
<text x="104" y="676" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#86efac">Result: race completed · stats persisted · next race opened</text>
</svg>