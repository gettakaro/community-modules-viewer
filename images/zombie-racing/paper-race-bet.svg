<text x="134" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">Live betting flow: command + currency path verified</text>
<text x="134" y="116" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#b7c2d6">Bot1_RaceTester placed a real Takaro bet while online on Paper</text>
<rect x="76" y="150" width="1128" height="288" rx="18" fill="#0f172a" stroke="#2d3a55"/>
<text x="104" y="184" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Command flow</text>
<text x="128" y="224" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• /racebet Comet 50 returned success=true.</text>
<text x="128" y="255" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• The module wrote zombie_racing_state_v1 with one bet: Bot1_RaceTester → Comet, amount 50,</text>
<text x="128" y="286" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">  odds 2.</text>
<text x="128" y="317" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• Takaro deducted 50 currency from the player and sent the private messages: Bet placed, Race</text>
<text x="128" y="348" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">  #1 now has 1 bet.</text>
<text x="128" y="379" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• /myracebets and /nextrace both read back the stored bet without runtime errors.</text>
<rect x="76" y="434" width="1128" height="186" rx="18" fill="#0f172a" stroke="#2d3a55"/>
<text x="104" y="468" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Why this matters</text>
<text x="128" y="508" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• This proves the dashboard-imported module can mutate Takaro state, deduct currency, and</text>
<text x="128" y="539" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">  message a live Paper player.</text>
<text x="128" y="570" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#dce3f0">• The race state variable acts as the source of truth for the next scheduled/admin race.</text>
<rect x="76" y="642" width="1128" height="54" rx="16" fill="#13251d" stroke="#1f7a4b"/>
<text x="104" y="676" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#86efac">Result: bet persisted · currency-deducted amount=50 · potential win=100</text>
